<html>
    <head>
        <title>포토캘린더</title>
        <style>
            #calendar {
                border : 1px solid black;
            }
            img {
                width: 100%;
            }
            #calendar th {             /*#calendar th : calendar 밑에 있는 모든 th*/
                                        /*#calendar > th : calendar 바로 밑에 있는 th*/
                width: 14%;
            }

            #calendar tr > *:first-child {
                color:red;
            }

            #calendar th:last-child,#calendar td:last-child{
                color: blue;
            }

        </style>
    </head>
    <body>
        <h1>포토캘린더</h1>
        <h2>4월</h2>
        <img src="사진1.jpg" width="80%">
        <table border="1" width="80%" id="calendar">
            <tr>
                <th width="14%" style="color: red">sun</th>
                <th width="14%">mon</th>
                <th width="14%">Tue</th>
                <th width="14%">Wed</th>
                <th width="14%">Thu</th>
                <th width="14%">Fri</th>
                <th width="14%">Sat</th>
            </tr>
            <tr>
                <td align="center" style="color: red"></td>
                <td align="center"></td>
                <td align="center"></td>
                <td align="center">1</td>
                <td align="center">2</td>
                <td align="center">3</td>
                <td align="center">4</td>
            </tr>
           <tr>
                <td align="center" style="color: red">5</td>
                <td align="center">6</td>
                <td align="center">7</td>
                <td align="center">8</td>
                <td align="center">9</td>
                <td align="center">10</td>
                <td align="center">11</td>
            </tr>
            <tr>
                <td style="color: red">12</td>
                <td>13</td>
                <td>14</td>
                <td>15</td>
                <td>16</td>
                <td>17</td>
                <td>18</td>
            </tr>
            <tr>
                <td style="color: red">19</td>
                <td>20</td>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
                <td>25</td>
            </tr>
            <tr>
                <td style="color: red">26</td>
                <td>27</td>
                <td>28</td>
                <td>29</td>
                <td>30</td>
                <td></td>
                <td></td>
            </tr>
        </table>
    </body>
</html>
