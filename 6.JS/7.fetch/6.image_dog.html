<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style></style>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <button id="loadBtn">데이터 요청</button>
    <div id="result"><!--응답 데이터를 표시할곳--></div>
    <script>
        /* GET 정보 요청 */
        document.getElementById('loadBtn').addEventListener('click', () => {
            fetch(`https://dog.ceo/api/breeds/image/random`)
                .then((response) => response.json())
                .then((data) => {
                    console.log(data);
                    const resultDiv = document.getElementById('result');
                    
                    resultDiv.innerHTML = `

                        <img src = ${data.message}>
                        
                    `;
                })
                .catch((error) => {
                    console.log("위에 fetch를 처리하고 가공하는 과정중 어딘가에서 오류가 났음: ", error)
                })
        });
    </script>
</body>
</html>
