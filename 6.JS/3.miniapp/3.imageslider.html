<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>

  <style>
    .slider {
      width: 400px;
      text-align: center;
    }

    .slider img {
      display: none;
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .slider img.active {
      display: block;
    }

    button {
      margin-top: 10px;
      padding: 8px 16px;
      cursor: pointer;
    }

    #imgName {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>이미지 슬라이더</h1>

  <div class="slider">
    <img id="img1" src="movie1.png" class="active">
    <img id="img2" src="movie2.jpg">
    <img id="img3" src="movie3.jpg">

    <div id="imgName">movie1.png</div>

    <button id="pre">이전</button>
    <button id="after">다음</button>
  </div>

  <script>
    const images = document.querySelectorAll(".slider img");
    const imgName = document.querySelector("#imgName");

    const preBtn = document.querySelector("#pre");
    const afterBtn = document.querySelector("#after");

    let currentIndex = 0;

    function showImage(index) {
      images[currentIndex].classList.remove("active");

      currentIndex = index;

      images[currentIndex].classList.add("active");
      imgName.textContent = images[currentIndex].getAttribute("src");
    }

    afterBtn.addEventListener("click", function () {
      let nextIndex = currentIndex + 1;

      if (nextIndex >= images.length) {
        nextIndex = 0;
      }

      showImage(nextIndex);
    });

    preBtn.addEventListener("click", function () {
      let prevIndex = currentIndex - 1;

      if (prevIndex < 0) {
        prevIndex = images.length - 1;
      }

      showImage(prevIndex);
    });
  </script>
</body>
</html>
