<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Form</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <main class="min-h-screen flex items-center justify-center bg-gray-100">
    
    <section
      class="
        w-[90%] md:w-[35%]
        rounded-2xl
        border border-gray-300
        bg-white
        p-8
        shadow-[18px_18px_35px_rgba(0,0,0,0.65)]
      "
    >
      <h1 class="text-2xl font-bold text-center mb-8">
        로그인
      </h1>

      <form class="space-y-5">
        <div>
          <label 
            for="username" 
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Username
          </label>
          <input
            id="username"
            type="text"
            placeholder="username을 입력하세요"
            class="
              w-full
              rounded-lg
              border border-gray-300
              px-4 py-3
              outline-none
              focus:border-blue-500
              focus:ring-2
              focus:ring-blue-200
            "
          />
        </div>

        <div>
          <label 
            for="password" 
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Password
          </label>
          <input
            id="password"
            type="password"
            placeholder="password를 입력하세요"
            class="
              w-full
              rounded-lg
              border border-gray-300
              px-4 py-3
              outline-none
              focus:border-blue-500
              focus:ring-2
              focus:ring-blue-200
            "
          />
        </div>

        <button
          type="submit"
          class="
            w-full
            rounded-lg
            bg-blue-600
            py-3
            font-semibold
            text-white
            hover:bg-blue-700
            transition
          "
        >
          로그인
        </button>
      </form>
    </section>

  </main>
</body>
</html>
