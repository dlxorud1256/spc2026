<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailwind 카드뷰</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="min-h-screen bg-gray-100 flex items-center justify-center p-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl">

      <div class="bg-blue-500 border-2 border-blue-700 rounded-xl overflow-hidden shadow-lg 
                  hover:bg-purple-500 hover:border-4 hover:border-purple-800 
                  transition-all duration-300 cursor-pointer">
        <img src="https://picsum.photos/400/250?random=1" class="w-full h-48 object-cover" />
        <div class="p-5 text-white">
          <h2 class="text-xl font-bold mb-2">카드 제목 1</h2>
          <p class="text-sm">마우스를 올리면 보라색으로 바뀝니다.</p>
        </div>
      </div>

      <div class="bg-blue-500 border-2 border-blue-700 rounded-xl overflow-hidden shadow-lg 
                  hover:bg-purple-500 hover:border-4 hover:border-purple-800 
                  transition-all duration-300 cursor-pointer">
        <img src="https://picsum.photos/400/250?random=2" class="w-full h-48 object-cover" />
        <div class="p-5 text-white">
          <h2 class="text-xl font-bold mb-2">카드 제목 2</h2>
          <p class="text-sm">테두리도 hover 시 굵어집니다.</p>
        </div>
      </div>

      <div class="bg-blue-500 border-2 border-blue-700 rounded-xl overflow-hidden shadow-lg 
                  hover:bg-purple-500 hover:border-4 hover:border-purple-800 
                  transition-all duration-300 cursor-pointer">
        <img src="https://picsum.photos/400/250?random=3" class="w-full h-48 object-cover" />
        <div class="p-5 text-white">
          <h2 class="text-xl font-bold mb-2">카드 제목 3</h2>
          <p class="text-sm">상단 이미지는 랜덤 이미지입니다.</p>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
